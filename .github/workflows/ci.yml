name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, mbstring, bcmath, intl, redis, gd, zip, exif, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Test DB: SQLite in-memory (phpunit.xml ile uyumlu). Faz 1'de PostgreSQL'e çevrilecek.
      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          php artisan key:generate --force
          # Secret yok; mail/cache/queue/session fake/array; DB sqlite memory
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=:memory:"
            echo "CACHE_STORE=array"
            echo "QUEUE_CONNECTION=sync"
            echo "SESSION_DRIVER=array"
            echo "MAIL_MAILER=array"
            echo "TELESCOPE_ENABLED=false"
          } >> .env

      - name: Migrate (sqlite :memory:)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Pint (style check)
        run: ./vendor/bin/pint --test

      - name: PHPUnit
        run: php artisan test

  frontend:
    name: Frontend (lint + tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Lokal geliştirme ile aynı major (lockfile uyumu)
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # eslint: sadece error fail eder (warning exit 0)
      - name: Lint (3 SPA)
        run: pnpm lint

      - name: Typecheck + build (3 SPA)
        run: pnpm build
