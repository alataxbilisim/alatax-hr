name: CI

on:
  push:
    branches: [main, faz1-postgresql]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: alatax_hr_testing
          POSTGRES_USER: alatax
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U alatax -d alatax_hr_testing"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, redis, gd, zip, exif, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          php artisan key:generate --force
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=alatax_hr_testing"
            echo "DB_USERNAME=alatax"
            echo "DB_PASSWORD=secret"
            echo "CACHE_STORE=array"
            echo "QUEUE_CONNECTION=sync"
            echo "SESSION_DRIVER=array"
            echo "MAIL_MAILER=array"
            echo "TELESCOPE_ENABLED=false"
          } >> .env

      - name: Migrate (PostgreSQL)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: alatax_hr_testing
          DB_USERNAME: alatax
          DB_PASSWORD: secret

      - name: Pint (style check)
        run: ./vendor/bin/pint --test

      - name: PHPUnit
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: alatax_hr_testing
          DB_USERNAME: alatax
          DB_PASSWORD: secret

  frontend:
    name: Frontend (lint + tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Lokal geliştirme ile aynı major (lockfile uyumu)
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # eslint: sadece error fail eder (warning exit 0)
      - name: Lint (3 SPA)
        run: pnpm lint

      - name: Typecheck + build (3 SPA)
        run: pnpm build
